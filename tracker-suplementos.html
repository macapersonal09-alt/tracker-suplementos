<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💊 Tracker Suplementos</title>
<style>
  :root{--verde:#2D6A4F;--verde-claro:#e8f5e9;--morado:#7B5EA7;--naranja:#E67E22;--azul:#2471A3;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7f5;color:#1B4332;min-height:100vh;}
  header{background:var(--verde);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
  header h1{font-size:1.05rem;font-weight:700;}
  .fecha-hoy{font-size:.78rem;opacity:.8;margin-left:auto;}
  main{padding:16px;max-width:500px;margin:0 auto;}
  .slot{margin-bottom:14px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .slot-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;color:#fff;font-weight:700;font-size:.9rem;}
  .slot-hdr.ayunas{background:var(--morado);}
  .slot-hdr.desayuno{background:var(--naranja);}
  .slot-hdr.comida{background:var(--verde);}
  .slot-hdr.noche{background:var(--azul);}
  .slot-time{margin-left:auto;font-size:.75rem;opacity:.85;font-weight:400;}
  .slot-body{background:#fff;padding:4px 12px 8px;}
  .item{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid #f0f7f4;}
  .item:last-child{border-bottom:none;}
  .item input[type=checkbox]{width:22px;height:22px;min-width:22px;accent-color:var(--verde);cursor:pointer;}
  .item label{flex:1;cursor:pointer;}
  .item label strong{display:block;font-size:.88rem;}
  .item label em{font-style:normal;font-size:.75rem;color:var(--verde);font-weight:600;}
  .item.checked{opacity:.45;}
  .item.checked label strong{text-decoration:line-through;}
  .barra-wrap{background:#fff;padding:10px 16px 6px;display:flex;align-items:center;gap:10px;}
  .barra{flex:1;height:8px;background:#e0f0e8;border-radius:4px;overflow:hidden;}
  .barra-fill{height:100%;background:var(--verde);border-radius:4px;transition:width .3s;}
  .barra-txt{font-size:.78rem;font-weight:700;color:var(--verde);}
  .btns{display:flex;gap:10px;margin:16px 0 8px;flex-wrap:wrap;}
  .btn-guardar{flex:1;padding:13px;background:var(--verde);color:#fff;border:none;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;}
  .btn-reset{padding:13px 16px;background:transparent;border:1.5px solid var(--verde);color:var(--verde);border-radius:12px;font-size:.9rem;font-weight:600;cursor:pointer;}
  .save-msg{text-align:center;font-size:.82rem;font-weight:600;color:var(--verde);min-height:20px;margin-bottom:8px;}

  /* Historial */
  .tabs{display:flex;gap:8px;margin:20px 0 12px;}
  .tab{padding:7px 18px;border:none;border-radius:20px;background:var(--verde-claro);color:var(--verde);font-size:.85rem;font-weight:600;cursor:pointer;}
  .tab.active{background:var(--verde);color:#fff;}
  .panel{display:none;} .panel.active{display:block;}
  .reg-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:.76rem;}
  th{background:var(--verde);color:#fff;padding:6px 4px;text-align:center;white-space:nowrap;line-height:1.3;}
  th.nombre-col{text-align:left;padding-left:8px;}
  td{padding:6px 4px;text-align:center;border-bottom:1px solid #f0f7f4;}
  td.nombre-col{text-align:left;font-size:.78rem;font-weight:600;padding-left:8px;white-space:normal;line-height:1.3;}
  tr:last-child td{border-bottom:none;}
  .adh-item{display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid #f0f7f4;}
  .adh-item:last-child{border-bottom:none;}
  .adh-dot{width:9px;height:9px;min-width:9px;border-radius:50%;}
  .adh-name{flex:1;font-size:.82rem;}
  .adh-bar-wrap{width:110px;min-width:70px;height:9px;background:#e8f5e9;border-radius:5px;overflow:hidden;}
  .adh-bar-fill{height:100%;border-radius:5px;}
  .adh-pct{font-size:.82rem;font-weight:700;width:36px;text-align:right;}
  .btn-actualizar{padding:6px 14px;background:var(--verde-claro);border:none;border-radius:20px;color:var(--verde);font-size:.78rem;font-weight:600;cursor:pointer;margin-bottom:10px;}
  .msg{padding:16px;text-align:center;color:#888;font-size:.85rem;}
  /* Config */
  .cfg-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f0f7f4;}
  .cfg-item:last-child{border-bottom:none;}
  .cfg-nombre{flex:1;font-size:.85rem;font-weight:600;}
  .cfg-dosis{font-size:.75rem;color:#888;display:block;}
  .cfg-select{font-size:.78rem;padding:4px 6px;border:1px solid #cde8d8;border-radius:8px;color:var(--verde);background:#fff;cursor:pointer;}
  .cfg-del{background:none;border:none;font-size:1.1rem;cursor:pointer;color:#ccc;padding:4px;}
  .cfg-del:active{color:#e74c3c;}
  .cfg-add{background:#fff;border-radius:12px;padding:14px;margin-top:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
  .cfg-add h3{font-size:.88rem;margin-bottom:10px;color:var(--verde);}
  .cfg-add input,.cfg-add select{width:100%;padding:9px 10px;margin-bottom:8px;border:1px solid #cde8d8;border-radius:8px;font-size:.85rem;}
  .btn-cfg-save{width:100%;padding:11px;background:var(--verde);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:4px;}
  .cfg-saved{text-align:center;font-size:.8rem;color:var(--verde);font-weight:600;min-height:18px;margin-top:6px;}
  /* Tabla historial con columna fija */
  .reg-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .reg-wrap table{border-collapse:collapse;table-layout:fixed;}
  .reg-wrap th,.reg-wrap td{border-bottom:1px solid #e8f0eb;}
  .reg-wrap td.nombre-col,.reg-wrap th.nombre-col{
    position:sticky;left:0;z-index:2;min-width:130px;max-width:130px;
  }
  .reg-wrap th.nombre-col{z-index:3;background:var(--verde);}
</style>
</head>
<body>

<header>
  <span style="font-size:1.4rem">💊</span>
  <h1>Suplementos</h1>
  <span class="fecha-hoy" id="fecha-hoy"></span>
</header>

<main>
  <!-- Tabs -->
  <div class="tabs" style="flex-wrap:wrap;">
    <button class="tab active" onclick="switchTab('tracker',this)">🗓️ Hoy</button>
    <button class="tab" onclick="switchTab('historial',this);cargarHistorial()">📅 Historial</button>
    <button class="tab" onclick="switchTab('adherencia',this);cargarHistorial()">📊 Adherencia</button>
    <button class="tab" onclick="switchTab('config',this);renderConfig()">⚙️ Config</button>
  </div>

  <!-- TRACKER -->
  <div class="panel active" id="panel-tracker">
    <div id="slots-container"></div>
    <div class="btns">
      <button class="btn-reset" onclick="resetDia()">↺ Reiniciar</button>
      <button class="btn-guardar" onclick="guardarDia()" id="btn-guardar">💾 Guardar día</button>
    </div>
    <div class="save-msg" id="save-msg"></div>
  </div>

  <!-- HISTORIAL -->
  <div class="panel" id="panel-historial">
    <button class="btn-actualizar" onclick="cargarHistorial()">↻ Actualizar</button>
    <div class="reg-wrap"><div id="tabla-historial"><p class="msg">Cargando…</p></div></div>
  </div>

  <!-- ADHERENCIA -->
  <div class="panel" id="panel-adherencia">
    <button class="btn-actualizar" onclick="cargarHistorial()">↻ Actualizar</button>
    <div id="lista-adherencia"><p class="msg">Cargando…</p></div>
  </div>

  <!-- CONFIG -->
  <div class="panel" id="panel-config">
    <div id="cfg-lista"></div>

    <div class="cfg-add">
      <h3>🕐 Agregar bloque de horario</h3>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">
        <input id="cfg-sl-icon" type="text" placeholder="🌞" style="width:52px;text-align:center">
        <input id="cfg-sl-label" type="text" placeholder="Nombre del bloque" style="flex:1">
      </div>
      <input id="cfg-sl-time" type="text" placeholder="HH:MM–HH:MM">
      <button class="btn-cfg-save" onclick="agregarSlot()">Agregar bloque</button>
    </div>

    <div class="cfg-add" style="margin-top:10px">
      <h3>➕ Agregar suplemento</h3>
      <input id="cfg-new-nombre" type="text" placeholder="Nombre">
      <input id="cfg-new-dosis" type="text" placeholder="Dosis (ej: 1 cáp)">
      <select id="cfg-new-slot"></select>
      <button class="btn-cfg-save" onclick="agregarSuplemento()">Agregar</button>
    </div>
    <div class="cfg-saved" id="cfg-saved"></div>
  </div>
</main>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz2kZlhSsHwOPNxrwFh2MnEh_XYk7yIg-JsyiO1PgehHmVaX8N5gbiIkdfw2u9c2Wh_/exec';

const SLOTS = [
  {id:'ayunas',   label:'Al despertar', icon:'🌅', time:'06:00–07:00'},
  {id:'desayuno', label:'Desayuno',     icon:'☀️', time:'07:00–08:00'},
  {id:'comida',   label:'Comida',       icon:'🌞', time:'13:00–14:00'},
  {id:'noche',    label:'Noche',        icon:'🌙', time:'21:00–22:00'},
];
// Cargar SLOTS desde localStorage
(function(){
  const saved = localStorage.getItem('slots_config');
  if(saved){ try{ const s=JSON.parse(saved); s.forEach((x,i)=>{ if(SLOTS[i]){ SLOTS[i].label=x.label; SLOTS[i].time=x.time; } }); }catch(_){} }
})();

const SUPS = [
  {id:'levotiroxina',  nombre:'Eutirox 50 mcg',           dosis:'50 mcg',  slot:'ayunas'},
  {id:'paroxetina',    nombre:'Paroxetina 20 mg',          dosis:'20 mg',   slot:'desayuno'},
  {id:'modafinilo',    nombre:'Modafinilo 100 mg',         dosis:'100 mg',  slot:'desayuno'},
  {id:'omega3',        nombre:'Omega 3',                   dosis:'1 cáp',   slot:'desayuno'},
  {id:'vitd3',         nombre:'Vitamina D3',               dosis:'1 cáp',   slot:'desayuno'},
  {id:'vitk2',         nombre:'Vitamina K2 MK-7',          dosis:'1 cáp',   slot:'desayuno'},
  {id:'selenio',       nombre:'Selenio + Vit E',           dosis:'1 cáp',   slot:'desayuno'},
  {id:'inositol',      nombre:'Myo-Inositol (½ dosis)',    dosis:'2 g',     slot:'desayuno'},
  {id:'zinc',          nombre:'Picolinato de Zinc',        dosis:'1 cáp',   slot:'comida'},
  {id:'glutamina',     nombre:'L-Glutamina',               dosis:'5 g',     slot:'comida'},
  {id:'akkermansia',   nombre:'Akkermansia + Resveratrol', dosis:'1 cáp',   slot:'comida'},
  {id:'vitc',          nombre:'Vitamina C',                dosis:'1 g',     slot:'comida'},
  {id:'ferrotemp',     nombre:'Ferrotemp 330 mg',          dosis:'1 cáp',   slot:'comida'},
  {id:'lifeed',        nombre:'LIFEED (Keratina)',         dosis:'1 cáp',   slot:'comida'},
  {id:'inositol_n',    nombre:'Myo-Inositol (½ noche)',    dosis:'2 g',     slot:'noche'},
  {id:'probioticos',   nombre:'Probióticos',               dosis:'1 cáp',   slot:'noche'},
  {id:'magnesio',      nombre:'Glicinato de Magnesio',    dosis:'2 cáp',   slot:'noche'},
  {id:'melatonina',    nombre:'Melatonina',                dosis:'1 cáp',   slot:'noche'},
  {id:'quetiapinalp',  nombre:'Quetiapina LP 50 mg',       dosis:'1 comp',  slot:'noche'},
  {id:'quetiapina25',  nombre:'Quetiapina 25 mg',          dosis:'1 comp',  slot:'noche'},
];

const SLOT_COLORS = {ayunas:'#7B5EA7',desayuno:'#E67E22',comida:'#2D6A4F',noche:'#2471A3'};
const SLOT_PALETTE = ['#C0392B','#8E44AD','#1A5276','#117A65','#784212','#1E8BC3','#6C3483','#2E4057'];
function slotColor(id){ return SLOT_COLORS[id] || SLOT_PALETTE[Math.abs(id.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%SLOT_PALETTE.length]; }
function getSlotLabels(){ const m={}; SLOTS.forEach(s=>m[s.id]=s.icon+' '+s.label); return m; }
function SLOT_LABELS_obj(){ return getSlotLabels(); }

// Carga SUPS desde localStorage si existe, si no usa los defaults
const SUPS_DEFAULT = SUPS.slice();
(function(){
  const saved = localStorage.getItem('sups_config');
  if(saved){ try{ const s=JSON.parse(saved); SUPS.length=0; s.forEach(x=>SUPS.push(x)); }catch(_){} }
})();

const state = {};
SUPS.forEach(s => state[s.id] = false);

function saveSups(){
  localStorage.setItem('sups_config', JSON.stringify(SUPS));
  // Inicializar state para nuevos suplementos
  SUPS.forEach(s=>{ if(state[s.id]===undefined) state[s.id]=false; });
}

// ── Config ─────────────────────────────────────────────
function renderConfig(){
  const el = document.getElementById('cfg-lista');
  const SL = getSlotLabels();

  // Sección: editar bloques de horario
  let h = `<div style="font-size:.72rem;font-weight:700;color:#888;padding:6px 0 6px;text-transform:uppercase;letter-spacing:.05em">Bloques de horario</div>`;
  SLOTS.forEach(sl => {
    h += `<div class="cfg-item" style="gap:6px">
      <span style="font-size:1.1rem">${sl.icon}</span>
      <input value="${sl.label}" style="flex:1;font-size:.82rem;padding:5px 7px;border:1px solid #cde8d8;border-radius:8px"
        onchange="editarSlot('${sl.id}','label',this.value)">
      <input value="${sl.time||''}" style="width:90px;font-size:.78rem;padding:5px 6px;border:1px solid #cde8d8;border-radius:8px"
        placeholder="HH:MM–HH:MM" onchange="editarSlot('${sl.id}','time',this.value)">
      <button class="cfg-del" onclick="eliminarSlot('${sl.id}')" title="Eliminar bloque">✕</button>
    </div>`;
  });

  // Sección: suplementos
  h += `<div style="font-size:.72rem;font-weight:700;color:#888;padding:14px 0 6px;text-transform:uppercase;letter-spacing:.05em">Suplementos</div>`;
  const slotOrder = SLOTS.map(s=>s.id);
  const ordered = [...SUPS].sort((a,b)=>slotOrder.indexOf(a.slot)-slotOrder.indexOf(b.slot));
  let lastSlot = '';
  ordered.forEach(s => {
    if(s.slot !== lastSlot){
      lastSlot = s.slot;
      h += `<div style="font-size:.72rem;color:#aaa;padding:8px 0 2px">${SL[s.slot]||s.slot}</div>`;
    }
    h += `<div class="cfg-item">
      <div style="flex:1">
        <span class="cfg-nombre">${s.nombre}</span>
        <span class="cfg-dosis">${s.dosis}</span>
      </div>
      <select class="cfg-select" onchange="cambiarSlot('${s.id}',this.value)">
        ${SLOTS.map(sl=>`<option value="${sl.id}"${sl.id===s.slot?' selected':''}>${sl.icon} ${sl.label}</option>`).join('')}
      </select>
      <button class="cfg-del" onclick="eliminarSup('${s.id}')" title="Eliminar">✕</button>
    </div>`;
  });

  // Actualizar picker del formulario de agregar
  el.innerHTML = h;
  const picker = document.getElementById('cfg-new-slot');
  if(picker) picker.innerHTML = SLOTS.map(sl=>`<option value="${sl.id}">${sl.icon} ${sl.label}</option>`).join('');
}

function editarSlot(id, campo, valor){
  const sl = SLOTS.find(s=>s.id===id);
  if(sl){ sl[campo]=valor; localStorage.setItem('slots_config',JSON.stringify(SLOTS)); renderTracker(); mostrarCfgMsg('Guardado ✓'); }
}

function agregarSlot(){
  const icon  = document.getElementById('cfg-sl-icon').value.trim() || '⏰';
  const label = document.getElementById('cfg-sl-label').value.trim();
  const time  = document.getElementById('cfg-sl-time').value.trim();
  if(!label){ alert('Escribe el nombre del bloque'); return; }
  const id = 'slot_'+Date.now();
  SLOTS.push({id, label, icon, time: time||''});
  localStorage.setItem('slots_config', JSON.stringify(SLOTS));
  document.getElementById('cfg-sl-icon').value='';
  document.getElementById('cfg-sl-label').value='';
  document.getElementById('cfg-sl-time').value='';
  renderConfig(); renderTracker(); mostrarCfgMsg('Bloque agregado ✓');
}

function eliminarSlot(id){
  const enUso = SUPS.some(s=>s.slot===id);
  if(enUso){ alert('Hay suplementos asignados a este bloque. Cámbiales el horario antes de eliminarlo.'); return; }
  const i = SLOTS.findIndex(s=>s.id===id);
  if(i>=0){ SLOTS.splice(i,1); localStorage.setItem('slots_config',JSON.stringify(SLOTS)); renderConfig(); renderTracker(); mostrarCfgMsg('Bloque eliminado ✓'); }
}

function cambiarSlot(id, nuevoSlot){
  const s = SUPS.find(x=>x.id===id);
  if(s){ s.slot=nuevoSlot; saveSups(); renderConfig(); renderTracker(); mostrarCfgMsg('Guardado ✓'); }
}

function eliminarSup(id){
  const i = SUPS.findIndex(x=>x.id===id);
  if(i>=0){ SUPS.splice(i,1); saveSups(); renderConfig(); renderTracker(); mostrarCfgMsg('Eliminado ✓'); }
}

function agregarSuplemento(){
  const nombre = document.getElementById('cfg-new-nombre').value.trim();
  const dosis  = document.getElementById('cfg-new-dosis').value.trim();
  const slot   = document.getElementById('cfg-new-slot').value;
  if(!nombre){ alert('Escribe el nombre'); return; }
  const id = 'sup_'+Date.now();
  SUPS.push({id, nombre, dosis: dosis||'—', slot});
  state[id] = false;
  saveSups();
  document.getElementById('cfg-new-nombre').value='';
  document.getElementById('cfg-new-dosis').value='';
  renderConfig(); renderTracker(); mostrarCfgMsg('Agregado ✓');
}

function mostrarCfgMsg(txt){
  const el=document.getElementById('cfg-saved');
  el.textContent=txt; setTimeout(()=>el.textContent='',2000);
}

// ── Fecha ──────────────────────────────────────────────
const hoy = new Date();
document.getElementById('fecha-hoy').textContent =
  hoy.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'});

// ── Render tracker ─────────────────────────────────────
function renderTracker() {
  const container = document.getElementById('slots-container');
  let html = '';
  SLOTS.forEach(slot => {
    const items = SUPS.filter(s => s.slot === slot.id);
    const done = items.filter(s => state[s.id]).length;
    const pct = items.length ? Math.round(done/items.length*100) : 0;
    const color = slotColor(slot.id);
    html += `<div class="slot">
      <div class="slot-hdr" style="background:${color}">${slot.icon} ${slot.label}<span class="slot-time">${slot.time}</span></div>
      <div class="barra-wrap">
        <div class="barra"><div class="barra-fill" style="width:${pct}%"></div></div>
        <span class="barra-txt">${done}/${items.length}</span>
      </div>
      <div class="slot-body">`;
    items.forEach(s => {
      const chk = state[s.id] ? 'checked' : '';
      const cls = state[s.id] ? 'checked' : '';
      html += `<div class="item ${cls}" id="item-${s.id}">
        <input type="checkbox" id="cb-${s.id}" ${chk} onchange="toggle('${s.id}',this)">
        <label for="cb-${s.id}"><strong>${s.nombre}</strong><em>${s.dosis}</em></label>
      </div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function toggle(id, cb) {
  state[id] = cb.checked;
  const item = document.getElementById('item-'+id);
  if(item) item.className = 'item' + (cb.checked?' checked':'');
  // update barra
  renderTracker(); // simple re-render
}

function resetDia() {
  SUPS.forEach(s => state[s.id] = false);
  renderTracker();
}

// ── Guardar ────────────────────────────────────────────
async function guardarDia() {
  const btn = document.getElementById('btn-guardar');
  const msg = document.getElementById('save-msg');
  const fecha = hoy.toLocaleDateString('es-MX',{year:'numeric',month:'2-digit',day:'2-digit'});
  const vals = SUPS.map(s => state[s.id]?'1':'0').join(',');
  const nombres = encodeURIComponent(SUPS.map(s=>s.nombre).join('|'));
  const url = `${SHEET_URL}?action=save&fecha=${encodeURIComponent(fecha)}&vals=${vals}&nombres=${nombres}`;
  btn.textContent='⏳ Guardando…'; btn.disabled=true;
  try {
    const r = await fetch(url, {redirect:'follow', credentials:'omit'});
    // El request llegó al servidor — aunque el JSON falle por CORS, el dato se guardó
    try { const d = await r.json(); if(d.status!=='ok') throw new Error(); } catch(_){}
    btn.textContent='✅ Guardado'; msg.textContent='Registrado: '+fecha;
  } catch(e) {
    btn.textContent='❌ Error — reintentar'; btn.disabled=false;
  }
  setTimeout(()=>{btn.textContent='💾 Guardar día';btn.disabled=false;},4000);
}

// ── Historial & Adherencia ─────────────────────────────
let _histData = null;
let _histLoaded = false;

const SHEET_ID = '1pBmU5DLWW_N9CukQOWpfZnz4f8mShZltf39ieyQYi-o';
const CSV_URL  = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&gid=0';

function parseCSV(text) {
  return text.trim().split('\n').map(row => {
    const cells = []; let cur = ''; let inQ = false;
    for(let i=0;i<row.length;i++){
      const c = row[i];
      if(c==='"'){ inQ=!inQ; continue; }
      if(c===','&&!inQ){ cells.push(cur); cur=''; continue; }
      cur+=c;
    }
    cells.push(cur);
    return cells.map(c=>c.trim());
  });
}

// Agrupa filas por fecha — si hay duplicados, ✅ gana
function groupByDate(data) {
  if(data.length < 2) return data;
  const headers = data[0];
  const rows = data.slice(1);
  const map = {};
  const order = [];
  rows.forEach(row => {
    const key = row[0];
    if(!map[key]){ map[key] = row.slice(); order.push(key); }
    else {
      for(let i=1;i<row.length;i++){
        if(row[i]==='✅') map[key][i]='✅';
      }
    }
  });
  return [headers].concat(order.map(k => map[k]));
}

async function cargarHistorial() {
  const tEl = document.getElementById('tabla-historial');
  const aEl = document.getElementById('lista-adherencia');
  if(tEl) tEl.innerHTML='<p class="msg">⏳ Cargando…</p>';
  if(aEl) aEl.innerHTML='<p class="msg">⏳ Cargando…</p>';
  _histLoaded = false;
  try {
    const r = await fetch(CSV_URL, {credentials:'omit'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const text = await r.text();
    const data = parseCSV(text);
    if(!data.length) throw new Error('sin datos');
    _histData = groupByDate(data); _histLoaded = true;
    renderHistorial(); renderAdherencia();
  } catch(e) {
    if(tEl) tEl.innerHTML='<p class="msg">❌ '+e.message+'</p>';
    if(aEl) aEl.innerHTML='<p class="msg">❌ '+e.message+'</p>';
  }
}

const CAT_BG = {
  tiroides: '#dbeafe', // azul claro
  psiq:     '#fef9c3', // amarillo claro
  vit:      '#fce7f3', // rosa claro
  hierro:   '#fee2e2', // rojo claro
};
const CATEGORIAS = {
  'Eutirox 50 mcg':           'tiroides',
  'Paroxetina 20 mg':         'psiq',
  'Modafinilo 100 mg':        'psiq',
  'Quetiapina LP 50 mg':      'psiq',
  'Quetiapina 25 mg':         'psiq',
  'Vitamina D3':              'vit',
  'Vitamina K2 MK-7':         'vit',
  'Vitamina C':               'vit',
  'Omega 3':                  'vit',
  'Selenio + Vit E':          'vit',
  'Ferrotemp 330 mg':         'hierro',
};
function catBg(nombre){ return CAT_BG[CATEGORIAS[nombre]] || '#fff'; }

function renderHistorial() {
  const el = document.getElementById('tabla-historial');
  if(!_histData||_histData.length<2){el.innerHTML='<p class="msg">Sin registros aún.</p>';return;}
  const headers = _histData[0];
  const rows = _histData.slice(1).reverse();
  let t = '<table><thead><tr><th class="nombre-col">Suplemento</th>';
  rows.forEach(r => {
    const dp = (r[0]||'').split('/');
    const label = dp.length>=2 ? dp[0]+'/'+dp[1] : (r[0]||'');
    t += `<th style="width:22px;min-width:22px;padding:4px 0;vertical-align:bottom">
      <div style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:.58rem;white-space:nowrap;padding:4px 0">${label}</div>
    </th>`;
  });
  t += '</tr></thead><tbody>';
  headers.slice(1).forEach((nombre, i) => {
    const bg = catBg(nombre);
    t += `<tr style="background:${bg}"><td class="nombre-col" style="background:${bg}">${nombre}</td>`;
    rows.forEach(r => {
      const val = r[i+1]||'';
      const tomado = val.includes('✅');
      t += tomado
        ? `<td style="background:${bg}"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#74c69d"></span></td>`
        : `<td style="background:${bg};color:#ccc;font-size:.7rem">·</td>`;
    });
    t += '</tr>';
  });
  t += '</tbody></table>';
  el.innerHTML = t;
}

function renderAdherencia() {
  const el = document.getElementById('lista-adherencia');
  if(!_histData||_histData.length<2){el.innerHTML='<p class="msg">Sin registros aún.</p>';return;}
  const headers = _histData[0].slice(1);
  const rows = _histData.slice(1);
  // Días transcurridos
  function parseF(f){ const p=(f||'').split(' ')[0].split('/'); return p.length===3?new Date(+p[2],+p[1]-1,+p[0]):new Date(); }
  const fechas = rows.map(r=>parseF(r[0]));
  const first = new Date(Math.min(...fechas)); first.setHours(0,0,0,0);
  const tod = new Date(); tod.setHours(0,0,0,0);
  const dias = Math.max(1, Math.round((tod-first)/86400000)+1);
  // Count per supplement
  let h = '<div>';
  headers.forEach((nombre, i) => {
    const count = rows.filter(r=>(r[i+1]||'')=='✅').length;
    const pct = Math.min(100, Math.round(count/dias*100));
    const color = pct>=80?'#2D6A4F':pct>=50?'#E67E22':'#C0392B';
    const slotSup = SUPS.find(s=>s.nombre===nombre);
    const dot = slotSup ? SLOT_COLORS[slotSup.slot]||'#2D6A4F' : '#2D6A4F';
    h += `<div class="adh-item">
      <div class="adh-dot" style="background:${dot}"></div>
      <span class="adh-name">${nombre}</span>
      <div class="adh-bar-wrap"><div class="adh-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="adh-pct" style="color:${color}">${pct}%</span>
    </div>`;
  });
  h += `<p style="font-size:.72rem;color:#999;margin-top:10px;text-align:right">${rows.length} registro(s) · ${dias} día(s) desde inicio</p>`;
  h += '</div>';
  el.innerHTML = h;
}

function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
}
